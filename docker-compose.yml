version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - keepmeupdated_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SQLALCHEMY_DATABASE_URL=sqlite+aiosqlite:////app/data/keepmeupdated.db
      - DEFAULT_PLUGIN_REPO=https://github.com/emkalyvas/KeepMeUpdated-Plugins

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  keepmeupdated_data:
